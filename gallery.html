<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery — Show Graphics</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d0d0d;color:#ddd;min-height:100vh}
a,button{cursor:pointer}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;padding:12px 16px;background:#151515;border-bottom:1px solid #2a2a2a;flex-wrap:wrap;align-items:center}
.toolbar input{padding:7px 11px;background:#222;border:1px solid #3a3a3a;color:#fff;border-radius:5px;font-size:.85rem}
.toolbar input[type=text]{flex:1;min-width:180px}
.toolbar input[type=password]{width:140px}
.btn{padding:7px 14px;border:none;border-radius:5px;font-size:.82rem;font-weight:500;transition:background .15s}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-gray{background:#2a2a2a;color:#ccc}.btn-gray:hover{background:#333}
.btn-red{background:#7f1d1d;color:#fca5a5}.btn-red:hover{background:#991b1b}
.btn-green{background:#14532d;color:#86efac}.btn-green:hover{background:#166534}
.btn-amber{background:#78350f;color:#fcd34d}.btn-amber:hover{background:#92400e}
.btn-sm{padding:5px 9px;font-size:.75rem}

/* ── Status ── */
#status{margin:8px 16px;padding:8px 14px;border-radius:5px;font-size:.83rem;display:none}
#status.ok{background:#14532d;color:#86efac;display:block}
#status.err{background:#450a0a;color:#fca5a5;display:block}

/* ── Slot previews ── */
.slots{display:flex;gap:12px;padding:12px 16px;background:#111;border-bottom:1px solid #2a2a2a}
.slot-panel{flex:1;min-width:0}
.slot-panel h3{font-size:.78rem;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.canvas-wrap{position:relative;overflow:hidden;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;cursor:move}
.canvas-wrap.ratio-h{aspect-ratio:16/9}
.canvas-wrap.ratio-v{aspect-ratio:9/16;max-height:calc((50vw - 28px) * (9/16));width:auto;margin:0 auto}
.canvas-wrap img.preview-img{position:absolute;transform-origin:center center;transition:transform .1s,left .1s,top .1s;z-index:1}
.canvas-wrap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;background-image:var(--grid-bg,none);background-size:var(--grid-sz,25% 25%)}
.grid-controls{display:flex;gap:10px;align-items:center;padding:6px 16px;background:#111;border-bottom:1px solid #1e1e1e;font-size:.75rem;color:#666}
.grid-controls select{background:#1e1e1e;color:#ccc;border:1px solid #2a2a2a;border-radius:4px;padding:3px 7px;font-size:.75rem}
.grid-controls label{display:flex;align-items:center;gap:5px;cursor:pointer;color:#777}
.canvas-empty{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:.8rem;color:#444;pointer-events:none}
.slot-controls{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.slot-controls label{font-size:.75rem;color:#666}
.slot-controls input[type=range]{width:90px;accent-color:#2563eb}
.slot-controls select{background:#1e1e1e;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 6px;font-size:.78rem}
.slot-name{font-size:.82rem;font-weight:600;color:#ddd;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Grid ── */
.grid-wrap{padding:12px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{position:relative;background:#1a1a1a;border-radius:7px;overflow:hidden;border:2px solid transparent;transition:border-color .2s,transform .15s;transform-origin:center top}
.card:hover{transform:scale(1.9);z-index:30}
.card.sel-h{border-color:#2563eb}
.card.sel-v{border-color:#7c3aed}
.card.sel-hv{border-color:#0d9488}
.card.pick-selected{outline:3px solid #f59e0b;outline-offset:-2px;border-color:#f59e0b}
.card.layout-card{border-color:#78350f}
.layout-flag{position:absolute;top:7px;right:7px;background:#78350f;color:#fcd34d;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;z-index:3}
.card.edited-card{border-color:#134e4a}
.edited-flag{position:absolute;top:7px;right:7px;background:#134e4a;color:#5eead4;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;z-index:3}
.card.dragging{opacity:0.4}
.card.drag-over{border-color:#2563eb !important;box-shadow:0 0 0 2px rgba(37,99,235,0.25)}
.grid-section{grid-column:1/-1;font-size:.72rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.1em;padding:12px 4px 6px;border-top:1px solid #2a2a2a;margin-top:4px}
.grid-section:first-child{border-top:none;margin-top:0;padding-top:4px}
.grid-section-empty{grid-column:1/-1;font-size:.78rem;color:#444;padding:10px 4px;font-style:italic}
.card-cb{position:absolute;top:7px;left:7px;z-index:3;width:18px;height:18px;cursor:pointer;accent-color:#f59e0b;display:none}
.card-thumb{width:100%;height:140px;object-fit:contain;display:block;background:#111}
.card-body{padding:8px}
.card-name{font-size:.83rem;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tags{font-size:.72rem;color:#666;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-actions{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:.65rem;padding:2px 6px;border-radius:3px;background:#1e3a5f;color:#93c5fd;font-weight:600}
.badge.v{background:#3b1d6e;color:#c4b5fd}

/* ── Layout thumb ── */
#layout-thumb{height:34px;border-radius:4px;border:1px solid #2a2a2a;display:none;vertical-align:middle}

/* ── Edit Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow:auto;padding:20px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#161616;border-radius:10px;width:100%;max-width:min(1400px,96vw);overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #2a2a2a}
.modal-header h2{font-size:1rem;color:#fff}
.modal-body{padding:16px;max-height:82vh;overflow-y:auto}
.edit-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.edit-layout{grid-template-columns:1fr}}
.edit-section h4{font-size:.78rem;color:#888;margin-bottom:8px;text-transform:uppercase}
.crop-wrap{max-height:520px;overflow:hidden;background:#111;border-radius:5px}
.crop-wrap img{max-width:100%;display:block}
.knockout-wrap{display:flex;flex-direction:column;gap:10px}
.ko-canvas-wrap{position:relative;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/20px 20px;border-radius:5px;overflow:hidden;min-height:120px;display:flex;align-items:center;justify-content:center}
.ko-canvas-wrap canvas{max-width:100%;max-height:520px;display:block}
.ko-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ko-row label{font-size:.78rem;color:#888}
.ko-row input[type=color]{width:36px;height:30px;border:none;border-radius:4px;cursor:pointer;background:none}
.ko-row input[type=range]{width:100px;accent-color:#2563eb}
.modal-footer{display:flex;gap:8px;padding:12px 18px;border-top:1px solid #2a2a2a;flex-wrap:wrap;justify-content:flex-end}

/* ── Trim grid ── */
.trim-section{margin-top:12px;padding-top:10px;border-top:1px solid #2a2a2a}
.trim-grid{display:grid;grid-template-columns:48px 1fr 52px;gap:4px 8px;align-items:center}
.trim-grid label{font-size:.75rem;color:#888;text-align:right}
.trim-grid input[type=range]{accent-color:#2563eb}
.trim-grid input[type=number]{width:52px;background:#222;border:1px solid #3a3a3a;color:#fff;border-radius:4px;padding:2px 5px;font-size:.78rem}

/* ── Preview Modal ── */
#preview-modal .modal{max-width:1200px;background:#0d0d0d}
.preview-layout{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.preview-canvas-block{flex:1;min-width:0}
.preview-canvas-block h4{font-size:.78rem;color:#888;margin-bottom:6px;text-transform:uppercase}
.big-canvas{position:relative;overflow:hidden;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;cursor:move}
.big-canvas.ratio-h{aspect-ratio:16/9;width:100%}
.big-canvas.ratio-v{aspect-ratio:9/16;max-height:60vh;width:auto;margin:0 auto}
.big-canvas img{position:absolute;transform-origin:center center}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <input type="password" id="api-key" placeholder="API Key" onkeydown="if(event.key==='Enter')saveKey()">
  <button class="btn btn-gray" onclick="toggleKeyVis()" title="Show/hide key" id="key-vis-btn">👁</button>
  <button class="btn btn-gray" onclick="saveKey()">Save Key</button>
  <input type="text" id="search" placeholder="Search name or tag…" oninput="renderGrid()">
  <button class="btn btn-green" onclick="openModal('upload-modal')">📤 Upload</button>
  <button class="btn btn-gray" onclick="loadGallery()">↺ Refresh</button>
  <button class="btn btn-gray" onclick="rebuildIndex()" title="Rebuild image list from R2 (use if gallery shows empty)">⚙ Rebuild Index</button>
  <button class="btn btn-amber btn-sm" id="select-btn" onclick="toggleSelectMode()">☑ Select</button>
  <button class="btn btn-red btn-sm" id="delete-sel-btn" style="display:none" onclick="deleteSelected()">🗑 Delete (<span id="sel-count">0</span>)</button>
  <span style="color:#333;padding:0 4px">|</span>
  <input type="text" id="layout-name" placeholder="Name your layout first, then save" style="width:240px" title="Enter a name for your layout, then click 💾 Save H, Save V, or Save Both">
  <button class="btn btn-blue btn-sm" onclick="saveLayout('h')" title="Save H slot as layout">💾 Save H</button>
  <button class="btn btn-sm" style="background:#3b1d6e;color:#c4b5fd" onclick="saveLayout('v')" title="Save V slot as layout">💾 Save V</button>
  <button class="btn btn-green btn-sm" onclick="saveLayout('both')" title="Save both slots as layout">💾 Save Both</button>
</div>
<div id="status"></div>

<!-- Slot previews -->
<div class="slots">
  <div class="slot-panel">
    <h3>🔵 Slot H — Horizontal <a href="https://edgarmohn-git.github.io/show-graphics_AD/graphic-h.html" target="_blank" style="font-size:.7rem;color:#555;font-weight:400;letter-spacing:0;text-transform:none;margin-left:6px;text-decoration:none;" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#555'">↗ open</a><button onclick="copyUrl('h')" title="Copy URL" style="background:none;border:none;color:#444;cursor:pointer;font-size:.75rem;margin-left:4px;padding:0" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#444'">📋</button></h3>
    <div class="canvas-wrap ratio-h" id="preview-h">
      <div class="canvas-empty">empty</div>
    </div>
    <div class="slot-name" id="name-h">—</div>
    <div class="slot-controls">
      <label>Scale</label>
      <input type="range" id="scale-h" min="10" max="200" value="100" step="1" oninput="onScaleChange('h')">
      <input type="number" id="scale-h-val" min="10" max="200" value="100" title="Double-click to reset to 100%" oninput="syncScaleNum('h')" ondblclick="resetScale('h')" style="width:52px;background:#222;border:1px solid #3a3a3a;color:#fff;border-radius:4px;padding:2px 5px;font-size:.78rem">
      <label>Fit</label>
      <select id="fit-h" onchange="onFitChange('h')">
        <option value="contain">Fit (show all)</option>
        <option value="cover">Fill (crop to fit)</option>
      </select>
      <button class="btn btn-red btn-sm" onclick="clearSlot('h')">Clear</button>
    </div>
  </div>
  <div class="slot-panel">
    <h3>🟣 Slot V — Vertical <a href="https://edgarmohn-git.github.io/show-graphics_AD/graphic-v.html" target="_blank" style="font-size:.7rem;color:#555;font-weight:400;letter-spacing:0;text-transform:none;margin-left:6px;text-decoration:none;" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#555'">↗ open</a><button onclick="copyUrl('v')" title="Copy URL" style="background:none;border:none;color:#444;cursor:pointer;font-size:.75rem;margin-left:4px;padding:0" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#444'">📋</button></h3>
    <div class="canvas-wrap ratio-v" id="preview-v">
      <div class="canvas-empty">empty</div>
    </div>
    <div class="slot-name" id="name-v">—</div>
    <div class="slot-controls">
      <label>Scale</label>
      <input type="range" id="scale-v" min="10" max="200" value="100" step="1" oninput="onScaleChange('v')">
      <input type="number" id="scale-v-val" min="10" max="200" value="100" title="Double-click to reset to 100%" oninput="syncScaleNum('v')" ondblclick="resetScale('v')" style="width:52px;background:#222;border:1px solid #3a3a3a;color:#fff;border-radius:4px;padding:2px 5px;font-size:.78rem">
      <label>Fit</label>
      <select id="fit-v" onchange="onFitChange('v')">
        <option value="contain">Fit (show all)</option>
        <option value="cover">Fill (crop to fit)</option>
      </select>
      <button class="btn btn-red btn-sm" onclick="clearSlot('v')">Clear</button>
    </div>
  </div>
</div>

<!-- Grid controls -->
<div class="grid-controls">
  <span>Preview grid:</span>
  <button id="grid-toggle" class="btn btn-gray btn-sm" onclick="toggleGrid()" style="min-width:64px">◉ Grid</button>
  <select id="grid-size" onchange="updateGridOverlay()">
    <option value="0">Off</option>
    <option value="2">2×2</option>
    <option value="3">3×3</option>
    <option value="4">4×4</option>
    <option value="5">5×5</option>
    <option value="10">10×10</option>
    <option value="20">20×20</option>
    <option value="25">25×25</option>
    <option value="40">40×40</option>
    <option value="50">50×50</option>
    <option value="80">80×80</option>
    <option value="100">100×100</option>
  </select>
  <label><input type="checkbox" id="snap-grid" onchange="saveGridPrefs()"> Snap to grid</label>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="edit-title">Edit Image</h2>
      <button class="btn btn-gray btn-sm" onclick="closeModal('edit-modal')">✕ Close</button>
    </div>
    <div class="modal-body">
      <div class="edit-layout">
        <div>
          <div class="edit-section"><h4>Crop</h4></div>
          <div class="crop-wrap"><img id="crop-img" crossorigin="anonymous"></div>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-gray btn-sm" onclick="resetCrop()">Reset crop</button>
            <button class="btn btn-blue btn-sm" onclick="applyCrop()">Apply crop →</button>
          </div>

          <div class="trim-section">
            <div class="edit-section"><h4>Trim Sides (%)</h4></div>
            <div class="trim-grid">
              <label>Top</label>
              <input type="range" id="trim-top" min="0" max="49" value="0" oninput="syncTrim('top','range')">
              <input type="number" id="trim-top-n" min="0" max="49" value="0" oninput="syncTrim('top','num')">
              <label>Right</label>
              <input type="range" id="trim-right" min="0" max="49" value="0" oninput="syncTrim('right','range')">
              <input type="number" id="trim-right-n" min="0" max="49" value="0" oninput="syncTrim('right','num')">
              <label>Bottom</label>
              <input type="range" id="trim-bottom" min="0" max="49" value="0" oninput="syncTrim('bottom','range')">
              <input type="number" id="trim-bottom-n" min="0" max="49" value="0" oninput="syncTrim('bottom','num')">
              <label>Left</label>
              <input type="range" id="trim-left" min="0" max="49" value="0" oninput="syncTrim('left','range')">
              <input type="number" id="trim-left-n" min="0" max="49" value="0" oninput="syncTrim('left','num')">
            </div>
            <button class="btn btn-gray btn-sm" style="margin-top:6px" onclick="resetTrim()">Reset trim</button>
          </div>
        </div>
        <div>
          <div class="edit-section"><h4>Background Knock-Out</h4></div>
          <div class="knockout-wrap">
            <div class="ko-canvas-wrap"><canvas id="ko-canvas"></canvas></div>
            <div class="ko-row">
              <label>Pick color:</label>
              <input type="color" id="ko-color" value="#ffffff">
              <button class="btn btn-gray btn-sm" onclick="enableEyedropper()">🎯 Click image</button>
            </div>
            <div class="ko-row">
              <label>Tolerance:</label>
              <input type="range" id="ko-tolerance" min="0" max="120" value="30" oninput="applyKnockout()">
              <span id="ko-tval">30</span>
            </div>
            <div class="ko-row">
              <label><input type="checkbox" id="ko-soft" style="margin-right:4px">Soft edges</label>
            </div>
            <div class="ko-row">
              <button class="btn btn-gray btn-sm" onclick="resetKnockout()">Reset KO</button>
              <button class="btn btn-blue btn-sm" onclick="applyKnockout()">Apply KO</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-green" onclick="saveEdited()">💾 Save as new image</button>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal" style="max-width:1100px">
    <div class="modal-header">
      <h2 id="preview-title">Preview</h2>
      <button class="btn btn-gray btn-sm" onclick="closeModal('preview-modal')">✕ Close</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.78rem;color:#666;margin-bottom:12px">Drag image to reposition. Changes save automatically.</p>
      <div class="preview-layout">
        <div class="preview-canvas-block" style="flex:2">
          <h4>H — 16:9</h4>
          <div class="big-canvas ratio-h" id="big-h">
            <img id="big-h-img" crossorigin="anonymous">
          </div>
        </div>
        <div class="preview-canvas-block" style="flex:1">
          <h4>V — 9:16</h4>
          <div class="big-canvas ratio-v" id="big-v">
            <img id="big-v-img" crossorigin="anonymous">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
const WORKER = 'https://show-graphics-ad.mohn-edgar.workers.dev';
let images = [];
let layouts = {};
let activeH = null, activeV = null;
let cropper = null;
let croppedImageData = null;
let trimmedCanvas = null;
let eyedropperMode = false;
let currentEditKey = null;
let dragState = null;
let selectMode = false;
let selectedKeys = new Set();
let selectedLayouts = new Set();
let layoutOrder = []; // ordered array of layout names
let drag = null;      // {type: 'layout'|'original'|'edited', idx: number}

// ── Init ──────────────────────────────────────────
window.onload = () => {
  const saved = sessionStorage.getItem('sg_api_key');
  if (saved) document.getElementById('api-key').value = saved;
  // Restore last known slot state instantly (before first poll returns)
  try {
    const last = JSON.parse(localStorage.getItem('sg_last_state') || 'null');
    if (last) {
      if (last.h) { activeH = last.h; updatePreview('h'); document.getElementById('name-h').textContent = last.h.name || last.h.key; document.getElementById('scale-h').value = last.h.scale; document.getElementById('scale-h-val').value = last.h.scale; document.getElementById('fit-h').value = last.h.fit; }
      if (last.v) { activeV = last.v; updatePreview('v'); document.getElementById('name-v').textContent = last.v.name || last.v.key; document.getElementById('scale-v').value = last.v.scale; document.getElementById('scale-v-val').value = last.v.scale; document.getElementById('fit-v').value = last.v.fit; }
    }
  } catch(e) {}
  // Restore grid prefs (default: 20×20, visible, snap off)
  try {
    const gp = JSON.parse(localStorage.getItem('sg_grid_prefs') || 'null');
    const size = gp?.size ?? '20';
    const snap = gp?.snap ?? false;
    gridVisible = gp?.visible ?? true;
    document.getElementById('grid-size').value = size;
    document.getElementById('snap-grid').checked = snap;
    document.getElementById('grid-toggle').textContent = gridVisible ? '◉ Grid' : '○ Grid';
  } catch(e) {}
  if (apiKey()) { loadGallery(); loadLayouts(); }
  else renderGrid(); // show "enter key" placeholder
  pollActive();
  setInterval(pollActive, 3000);
  updateGridOverlay();
};

async function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) { setStatus('Enter an API key first.', false); return; }
  sessionStorage.setItem('sg_api_key', k);
  try {
    const r = await fetch(`${WORKER}/list`, { headers: { 'X-API-Key': k } });
    if (r.ok) {
      const imgs = await r.json();
      images = imgs;
      setStatus(`Key accepted — ${imgs.length} image(s) found.`, true);
      await loadLayouts();
      renderGrid();
    } else {
      sessionStorage.removeItem('sg_api_key');
      setStatus('Wrong key — access denied.', false);
    }
  } catch(e) { setStatus('Connection error: ' + e.message, false); }
}
function toggleKeyVis() {
  const el = document.getElementById('api-key');
  el.type = el.type === 'password' ? 'text' : 'password';
}
function apiKey() { return sessionStorage.getItem('sg_api_key') || ''; }

async function loadLayouts() {
  try {
    const [lr, or] = await Promise.all([
      fetch(`${WORKER}/layouts`, { headers: { 'X-API-Key': apiKey() } }),
      fetch(`${WORKER}/layout-order`, { headers: { 'X-API-Key': apiKey() } })
    ]);
    if (lr.ok) layouts = await lr.json(); else layouts = {};
    if (or.ok) layoutOrder = await or.json(); else layoutOrder = [];
  } catch(e) { layouts = {}; layoutOrder = []; }
  Object.keys(layouts).forEach(n => { if (!layoutOrder.includes(n)) layoutOrder.push(n); });
  layoutOrder = layoutOrder.filter(n => n in layouts);
  renderGrid();
}

async function pollActive() {
  try {
    const [rh, rv] = await Promise.all([
      fetch(`${WORKER}/active?slot=h`).then(r => r.json()),
      fetch(`${WORKER}/active?slot=v`).then(r => r.json()),
    ]);
    const hChanged = JSON.stringify(rh) !== JSON.stringify(activeH);
    const vChanged = JSON.stringify(rv) !== JSON.stringify(activeV);
    const draggingH = dragState?.slot === 'h';
    const draggingV = dragState?.slot === 'v';
    if (!draggingH) {
      activeH = rh;
      if (hChanged) {
        updatePreview('h');
        document.getElementById('name-h').textContent = rh?.name || (rh ? rh.key : '—');
        if (rh) { document.getElementById('scale-h').value = rh.scale; document.getElementById('scale-h-val').value = rh.scale; document.getElementById('fit-h').value = rh.fit; }
      }
    }
    if (!draggingV) {
      activeV = rv;
      if (vChanged) {
        updatePreview('v');
        document.getElementById('name-v').textContent = rv?.name || (rv ? rv.key : '—');
        if (rv) { document.getElementById('scale-v').value = rv.scale; document.getElementById('scale-v-val').value = rv.scale; document.getElementById('fit-v').value = rv.fit; }
      }
    }
    // Auto-save state for next page load
    try { localStorage.setItem('sg_last_state', JSON.stringify({ h: rh, v: rv })); } catch(e) {}
    if (hChanged || vChanged) renderGrid();
  } catch(e) {}
}

// ── Canvas preview ────────────────────────────────
function updatePreview(slot) {
  const state = slot === 'h' ? activeH : activeV;
  const wrap = document.getElementById(`preview-${slot}`);
  if (!state) { wrap.innerHTML = '<div class="canvas-empty">empty</div>'; return; }
  let img = wrap.querySelector('img.preview-img');
  if (!img) { wrap.innerHTML = ''; img = document.createElement('img'); img.className = 'preview-img'; wrap.appendChild(img); initDrag(wrap, slot); }
  const src = `${WORKER}/img/${encodeURIComponent(state.key)}`;
  if (img.getAttribute('data-key') !== state.key) { img.src = src; img.setAttribute('data-key', state.key); }
  applyImgStyle(img, state, wrap);
}

function applyImgStyle(img, state, wrap) {
  const s = state.scale / 100;
  img.style.width = '100%'; img.style.height = '100%';
  img.style.objectFit = state.fit === 'cover' ? 'cover' : 'contain';
  img.style.maxWidth = ''; img.style.maxHeight = '';
  img.style.left = state.x + '%';
  img.style.top = state.y + '%';
  img.style.transform = `translate(-50%,-50%) scale(${s})`;
}

function syncScaleNum(slot) {
  const val = Math.max(10, Math.min(200, parseInt(document.getElementById(`scale-${slot}-val`).value) || 100));
  document.getElementById(`scale-${slot}-val`).value = val;
  document.getElementById(`scale-${slot}`).value = val;
  const state = slot === 'h' ? activeH : activeV;
  if (!state) return;
  state.scale = val;
  const wrap = document.getElementById(`preview-${slot}`);
  const img = wrap.querySelector('img.preview-img');

}

function resetScale(slot) {

function onScaleChange(slot) {

let slotTimers = {};
function debounceSlotUpdate(slot) {
  clearTimeout(slotTimers[slot]);
  slotTimers[slot] = setTimeout(() => saveSlotState(slot), 400);
}

async function saveSlotState(slot) {
  const state = slot === 'h' ? activeH : activeV;

    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },

  });

// ── Drag to place ─────────────────────────────────
function snapVal(val) {
  const divisions = parseInt(document.getElementById('grid-size')?.value || '0');
  if (!divisions || !document.getElementById('snap-grid')?.checked) return val;
  const step = 100 / divisions;
  return Math.round(val / step) * step;
}

function initDrag(wrap, slot) {
  wrap.addEventListener('pointerdown', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    dragState = { slot, startX: e.clientX, startY: e.clientY, rect,
      ox: (slot === 'h' ? activeH : activeV)?.x || 50,
      oy: (slot === 'h' ? activeH : activeV)?.y || 50 };
    wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener('pointermove', e => {
    if (!dragState || dragState.slot !== slot) return;
    const dx = ((e.clientX - dragState.startX) / dragState.rect.width) * 100;
    const dy = ((e.clientY - dragState.startY) / dragState.rect.height) * 100;
    const state = slot === 'h' ? activeH : activeV;
    if (!state) return;
    state.x = snapVal(dragState.ox + dx);
    state.y = snapVal(dragState.oy + dy);
    const img = wrap.querySelector('img.preview-img');
    if (img) applyImgStyle(img, state, wrap);
  });
  wrap.addEventListener('pointerup', () => {
    if (dragState?.slot === slot) { saveSlotState(slot); dragState = null; }
  });
}

function updateGridOverlay() {
  const divisions = parseInt(document.getElementById('grid-size').value);
  const wraps = document.querySelectorAll('.canvas-wrap');
  if (!divisions || !gridVisible) {
    wraps.forEach(w => w.style.setProperty('--grid-bg', 'none'));
    saveGridPrefs();
    return;
  }
  const pct = (100 / divisions).toFixed(6) + '%';
  const line = 'rgba(255,255,255,0.35)';
  const bg = `linear-gradient(${line} 1px, transparent 1px), linear-gradient(90deg, ${line} 1px, transparent 1px)`;
  wraps.forEach(w => {
    w.style.setProperty('--grid-bg', bg);
    w.style.setProperty('--grid-sz', `${pct} ${pct}`);
  });
  saveGridPrefs();
}

async function galleryUploadOne(file, name, tags) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('name', name);
  fd.append('tags', tags);
  const r = await fetch(`${WORKER}/upload`, { method: 'POST', headers: { 'X-API-Key': apiKey() }, body: fd });
  return r.json();

async function galleryUpload() {
  const files = document.getElementById('ul-file').files;
  const tags = document.getElementById('ul-tags').value.trim();
  if (!files.length) { setUlStatus('Select a file first.', false); return; }
  if (files.length === 1) {
    const name = document.getElementById('ul-name').value.trim() || files[0].name.replace(/\.[^.]+$/, '');
    setUlStatus('Uploading…', true);
    try {
      const data = await galleryUploadOne(files[0], name, tags);
      if (data.ok) {
        setUlStatus(`✓ Uploaded: ${name}`, true);
        document.getElementById('ul-file').value = '';
        document.getElementById('ul-preview').style.display = 'none';
        document.getElementById('ul-name').value = '';
        document.getElementById('ul-tags').value = '';
        await loadGallery();
      } else { setUlStatus(`Error: ${data.error}`, false); }
    } catch(e) { setUlStatus(`Upload failed: ${e.message}`, false); }
  } else {
    let done = 0, failed = 0;
    for (const file of files) {
      const name = file.name.replace(/\.[^.]+$/, '');
      setUlStatus(`Uploading ${done + failed + 1} / ${files.length}: ${name}…`, true);
      try {
        const data = await galleryUploadOne(file, name, tags);
        if (data.ok) done++; else failed++;
      } catch(e) { failed++; }
    }
    setUlStatus(failed === 0 ? `✓ ${done} file(s) uploaded.` : `${done} uploaded, ${failed} failed.`, failed === 0);
    document.getElementById('ul-file').value = '';
    document.getElementById('ul-multi-info').style.display = 'none';
    document.getElementById('ul-name-row').style.display = 'block';
    document.getElementById('ul-tags').value = '';
    await loadGallery();
  }
}

// ── Drag helpers ──────────────────────────────────
function addDragHandlers(card, type, idx) {
  card.draggable = true;
  card.addEventListener('dragstart', e => {
    drag = { type, idx };
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    drag = null;
  });
  card.addEventListener('dragover', e => {
    if (!drag || drag.type !== type) return;
    e.preventDefault();
    card.classList.add('drag-over');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (!drag || drag.type !== type || drag.idx === idx) return;
    const from = drag.idx;
    if (type === 'layout') {
      const item = layoutOrder.splice(from, 1)[0];
      layoutOrder.splice(idx, 0, item);
      renderGrid();
      saveLayoutOrder();
    } else {
      const origArr = images.filter(i => !(i.tags||[]).includes('edited'));
      const editArr = images.filter(i => (i.tags||[]).includes('edited'));
      const arr = type === 'original' ? origArr : editArr;
      const item = arr.splice(from, 1)[0];
      arr.splice(idx, 0, item);
      images = type === 'original' ? [...arr, ...editArr] : [...origArr, ...arr];
      renderGrid();
      saveImageOrder();
    }
  });
}

          <div class="card-name">${img.name} ${isH?'<span class="badge">H</span>':''} ${isV?'<span class="badge v">V</span>':''}</div>
          <div class="card-tags">${(img.tags||[]).filter(t=>t!=='edited').join(', ')||'&nbsp;'}</div>

            <button class="btn btn-gray btn-sm" onclick="openPreview('${img.key}','${img.name.replace(/'/g,"\\'")}')">🔍</button>

          <button class="btn btn-red btn-sm" onclick="deleteImage('${img.key}')">🗑</button>
        </div>

    grid.appendChild(card);

function toggleSelect(key, cb) {

  cards.forEach(card => {
    const c = card.querySelector('.card-cb');
    if (c && c.onchange) {
      const k = c.getAttribute('onchange').match(/'([^']+)'/)?.[1];
      if (k === key) card.classList.toggle('pick-selected', cb.checked);
    }
  });
}

  document.getElementById('sel-count').textContent = selectedKeys.size + selectedLayouts.size;
}

async function renameLayout(oldName) {
  const newName = prompt('Rename layout:', oldName);
  if (!newName || newName.trim() === oldName) return;
  const n = newName.trim();
  if (layouts[n] && !confirm(`Layout "${n}" already exists. Overwrite?`)) return;
  try {
    await fetch(`${WORKER}/layouts/${encodeURIComponent(n)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },
      body: JSON.stringify(layouts[oldName])
    });
    await fetch(`${WORKER}/layouts/${encodeURIComponent(oldName)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
    layouts[n] = layouts[oldName];
    delete layouts[oldName];
    const oi = layoutOrder.indexOf(oldName);
    if (oi >= 0) layoutOrder.splice(oi, 1, n); else layoutOrder.push(n);
    saveLayoutOrder();
    renderGrid();
    setStatus(`Layout renamed to "${n}".`, true);
  } catch(e) { setStatus('Error renaming layout: ' + e.message, false); }
}

async function deleteSelected() {
  const total = selectedKeys.size + selectedLayouts.size;
  if (!total) return;
  if (!confirm(`Delete ${total} item(s)?`)) return;
  let done = 0;
  for (const key of selectedKeys) {
    try {
      await fetch(`${WORKER}/img/${encodeURIComponent(key)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
      done++;
    } catch(e) {}
  }
  for (const name of selectedLayouts) {
    try {
      await fetch(`${WORKER}/layouts/${encodeURIComponent(name)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
      delete layouts[name];
    } catch(e) {}
  }
  const msg = [done ? `${done} image(s)` : '', selectedLayouts.size ? `${selectedLayouts.size} layout(s)` : ''].filter(Boolean).join(' and ');
  setStatus(`Deleted ${msg}.`, true);
  selectedKeys.clear(); selectedLayouts.clear();
  toggleSelectMode();
  await loadGallery();
}

// ── Slot management ───────────────────────────────
async function selectSlot(slot, key, name) {
  // Always load library images at neutral defaults — positioning is done in the slot preview
  try {
    await fetch(`${WORKER}/select`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },
      body: JSON.stringify({ slot, key, name, scale: 100, fit: 'contain', x: 50, y: 50 })
    });
    setStatus(`Set ${slot.toUpperCase()}: ${name}`, true);
    await pollActive();
  } catch(e) { setStatus('Error: ' + e.message, false); }
}


async function clearSlot(slot) {
  try {
    await fetch(`${WORKER}/select?slot=${slot}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
    if (slot === 'h') activeH = null; else activeV = null;
    updatePreview(slot);
    document.getElementById(`name-${slot}`).textContent = '—';
    renderGrid();
    setStatus(`Slot ${slot.toUpperCase()} cleared`, true);
  } catch(e) { setStatus('Error: ' + e.message, false); }
}

async function deleteImage(key) {
  if (!confirm('Delete this image?')) return;
  try {
    await fetch(`${WORKER}/img/${encodeURIComponent(key)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
    setStatus('Deleted', true);
    await loadGallery();
  } catch(e) { setStatus('Error: ' + e.message, false); }
}

// ── Edit Modal ────────────────────────────────────
function openEdit(key, name) {
  currentEditKey = key;
  croppedImageData = null;
  trimmedCanvas = null;
  resetTrim();
  document.getElementById('edit-title').textContent = `Edit: ${name}`;
  const img = document.getElementById('crop-img');
  img.src = `${WORKER}/img/${encodeURIComponent(key)}?t=${Date.now()}`;
  img.onload = () => {
    if (cropper) { cropper.destroy(); cropper = null; }
    cropper = new Cropper(img, { autoCropArea: 1, viewMode: 1, movable: false, zoomable: false });
    initKoCanvas(img);
  };
  openModal('edit-modal');
}

function resetCrop() { if (cropper) cropper.reset(); }

function applyCrop() {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas();
  croppedImageData = canvas;
  trimmedCanvas = null;
  const koCanvas = document.getElementById('ko-canvas');
  koCanvas.width = canvas.width; koCanvas.height = canvas.height;
  koCanvas.getContext('2d').drawImage(canvas, 0, 0);
  setStatus('Crop applied. Adjust trim / knock-out or save.', true);
}

function initKoCanvas(img) {
  const c = document.getElementById('ko-canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  c.onclick = e => { if (!eyedropperMode) return; pickColor(e, c); };
}

// ── Trim sides ────────────────────────────────────
function syncTrim(side, from) {
  const range = document.getElementById(`trim-${side}`);
  const num = document.getElementById(`trim-${side}-n`);
  if (from === 'range') num.value = range.value;
  else { const v = Math.max(0, Math.min(49, parseInt(num.value)||0)); num.value = v; range.value = v; }
  applyTrimPreview();
}

function applyTrimPreview() {
  const top    = parseInt(document.getElementById('trim-top').value)    || 0;
  const right  = parseInt(document.getElementById('trim-right').value)  || 0;
  const bottom = parseInt(document.getElementById('trim-bottom').value) || 0;
  const left   = parseInt(document.getElementById('trim-left').value)   || 0;

  const src = croppedImageData || document.getElementById('crop-img');
  const sw = src.width || src.naturalWidth;
  const sh = src.height || src.naturalHeight;
  const sx = Math.round(sw * left / 100);
  const sy = Math.round(sh * top / 100);
  const w  = Math.max(1, Math.round(sw * (100 - left - right) / 100));
  const h  = Math.max(1, Math.round(sh * (100 - top - bottom) / 100));

  const t = document.createElement('canvas');
  t.width = w; t.height = h;
  t.getContext('2d').drawImage(src, sx, sy, w, h, 0, 0, w, h);
  trimmedCanvas = t;

  const c = document.getElementById('ko-canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(t, 0, 0);
}

function resetTrim() {
  ['top','right','bottom','left'].forEach(s => {
    const r = document.getElementById(`trim-${s}`);
    const n = document.getElementById(`trim-${s}-n`);
    if (r) r.value = 0;
    if (n) n.value = 0;
  });
  trimmedCanvas = null;
  // redraw ko-canvas from base source if open
  const src = croppedImageData || document.getElementById('crop-img');
  if (!src || (!src.width && !src.naturalWidth)) return;
  const c = document.getElementById('ko-canvas');
  const w = src.width || src.naturalWidth;
  const h = src.height || src.naturalHeight;
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(src, 0, 0);
}

// ── Knock-out ─────────────────────────────────────
function enableEyedropper() {
  eyedropperMode = true;
  document.getElementById('ko-canvas').style.cursor = 'crosshair';
  setStatus('Click on the color you want to remove', true);
}

function pickColor(e, canvas) {
  eyedropperMode = false;
  canvas.style.cursor = 'default';
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  const data = canvas.getContext('2d').getImageData(x, y, 1, 1).data;
  const hex = '#' + [data[0],data[1],data[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  document.getElementById('ko-color').value = hex;
  applyKnockout();
}

function applyKnockout() {
  const src = trimmedCanvas || croppedImageData || document.getElementById('crop-img');
  const tol = parseInt(document.getElementById('ko-tolerance').value);
  document.getElementById('ko-tval').textContent = tol;
  const hex = document.getElementById('ko-color').value;
  const tr = parseInt(hex.slice(1,3),16), tg = parseInt(hex.slice(3,5),16), tb = parseInt(hex.slice(5,7),16);
  const c = document.getElementById('ko-canvas');
  const tmp = document.createElement('canvas');
  tmp.width = src.width || src.naturalWidth; tmp.height = src.height || src.naturalHeight;
  tmp.getContext('2d').drawImage(src, 0, 0);
  const ctx = tmp.getContext('2d');
  const id = ctx.getImageData(0, 0, tmp.width, tmp.height);
  const d = id.data;
  const soft = document.getElementById('ko-soft')?.checked;
  for (let i = 0; i < d.length; i += 4) {
    const dist = Math.sqrt((d[i]-tr)**2 + (d[i+1]-tg)**2 + (d[i+2]-tb)**2);
    if (dist < tol) {
      if (soft) {
        const t = dist / tol; // 0=center, 1=edge
        d[i+3] = Math.round(d[i+3] * t * t * (3 - 2 * t)); // smoothstep
      } else {
        d[i+3] = 0;
      }
    }
  }
  ctx.putImageData(id, 0, 0);
  c.width = tmp.width; c.height = tmp.height;
  c.getContext('2d').drawImage(tmp, 0, 0);
}

function resetKnockout() {
  const src = trimmedCanvas || croppedImageData || document.getElementById('crop-img');
  const c = document.getElementById('ko-canvas');
  c.width = src.width || src.naturalWidth; c.height = src.height || src.naturalHeight;
  c.getContext('2d').drawImage(src, 0, 0);
  document.getElementById('ko-tolerance').value = 30;
  document.getElementById('ko-tval').textContent = 30;
}

async function saveEdited() {
  const canvas = document.getElementById('ko-canvas');
  if (!canvas.width) { setStatus('Nothing to save', false); return; }
  canvas.toBlob(async blob => {
    const orig = images.find(i => i.key === currentEditKey);
    const name = (orig?.name || 'image') + '_edited';
    const tags = ['edited', ...(orig?.tags || []).filter(t => t !== 'edited')].join(',');
    const fd = new FormData();
    fd.append('file', new File([blob], name + '.png', { type: 'image/png' }));
    fd.append('name', name); fd.append('tags', tags);
    try {
      const r = await fetch(`${WORKER}/upload`, { method: 'POST', headers: { 'X-API-Key': apiKey() }, body: fd });
      const data = await r.json();
      if (data.ok) { setStatus('Saved as new image: ' + name, true); closeModal('edit-modal'); await loadGallery(); }
      else setStatus('Error: ' + data.error, false);
    } catch(e) { setStatus('Save failed: ' + e.message, false); }
  }, 'image/png');
}

// ── Preview Modal ─────────────────────────────────
function openPreview(key, name) {
  document.getElementById('preview-title').textContent = `Preview: ${name}`;
  const url = `${WORKER}/img/${encodeURIComponent(key)}?t=${Date.now()}`;
  ['h','v'].forEach(slot => {
    const state = slot === 'h' ? activeH : activeV;
    const wrap = document.getElementById(`big-${slot}`);
    const img = document.getElementById(`big-${slot}-img`);
    img.src = url;
    img.setAttribute('data-key', key);
    if (state && state.key === key) {
      applyImgStyle(img, state, wrap);
    } else {
      applyImgStyle(img, { scale: 80, fit: 'contain', x: 50, y: 50 }, wrap);
    }
    initBigDrag(wrap, slot, key, name);
  });
  openModal('preview-modal');
}

function initBigDrag(wrap, slot, key, name) {
  wrap.onpointerdown = e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const state = slot === 'h' ? activeH : activeV;
    dragState = { slot, startX: e.clientX, startY: e.clientY, rect, ox: state?.x||50, oy: state?.y||50, key, name };
    wrap.setPointerCapture(e.pointerId);
  };
  wrap.onpointermove = e => {
    if (!dragState || dragState.slot !== slot) return;
    const dx = ((e.clientX - dragState.startX) / dragState.rect.width) * 100;
    const dy = ((e.clientY - dragState.startY) / dragState.rect.height) * 100;
    const x = dragState.ox + dx;
    const y = dragState.oy + dy;
    const img = document.getElementById(`big-${slot}-img`);
    const fakeState = { ...(slot==='h'?activeH:activeV)||{scale:80,fit:'contain'}, x, y };
    applyImgStyle(img, fakeState, wrap);
  };
  wrap.onpointerup = async e => {
    if (!dragState || dragState.slot !== slot) return;
    const dx = ((e.clientX - dragState.startX) / dragState.rect.width) * 100;
    const dy = ((e.clientY - dragState.startY) / dragState.rect.height) * 100;
    const x = Math.max(0, Math.min(100, dragState.ox + dx));
    const y = Math.max(0, Math.min(100, dragState.oy + dy));
    const prev = slot === 'h' ? activeH : activeV;
    if (prev && prev.key === key) {
      prev.x = x; prev.y = y;
      await saveSlotState(slot);
      updatePreview(slot);
    }
    dragState = null;
  };
}

// ── Layouts ───────────────────────────────────────

async function captureLayoutThumb(slot) {
  const W = 480, TH = 120;
  const c = document.createElement('canvas');
  c.width = W; c.height = TH;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, TH);

  const loadImg = url => new Promise(resolve => {
    const i = new Image(); i.crossOrigin = 'anonymous';
    i.onload = () => resolve(i); i.onerror = () => resolve(null);
    i.src = url;
  });

  const drawSlot = async (state, boxX, boxW, label, labelColor) => {
    if (state?.key) {
      const img = await loadImg(`${WORKER}/img/${encodeURIComponent(state.key)}`);
      if (img) {
        ctx.save();
        ctx.beginPath(); ctx.rect(boxX, 0, boxW, TH); ctx.clip();
        const scale = Math.min(boxW / img.naturalWidth, TH / img.naturalHeight);
        const dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
        ctx.drawImage(img, boxX + (boxW - dw) / 2, (TH - dh) / 2, dw, dh);
        ctx.restore();
      }
      ctx.fillStyle = labelColor;
      ctx.fillRect(boxX, TH - 16, boxW, 16);
      ctx.fillStyle = '#fff'; ctx.font = '10px system-ui';
      ctx.fillText(label + ': ' + (state.name || '—'), boxX + 4, TH - 4);
    } else {
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(boxX, 0, boxW, TH);
      ctx.fillStyle = '#444'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
      ctx.fillText(label + ' empty', boxX + boxW / 2, TH / 2 + 4); ctx.textAlign = 'left';
    }
  };

  const hW = Math.round(TH * 16 / 9); // ~213px
  const vW = Math.round(TH * 9 / 16); // ~67px

  if (slot === 'h') {
    // H fills the full thumbnail width
    await drawSlot(activeH, 0, W, 'H', 'rgba(37,99,235,0.7)');
  } else if (slot === 'v') {
    // V centered in the thumbnail
    const vX = Math.round((W - vW) / 2);
    await drawSlot(activeV, vX, vW, 'V', 'rgba(124,58,237,0.7)');
  } else {
    // Both: H left, gap, V right
    await drawSlot(activeH, 0, hW, 'H', 'rgba(37,99,235,0.7)');
    ctx.fillStyle = '#0d0d0d'; ctx.fillRect(hW, 0, 8, TH);
    await drawSlot(activeV, hW + 8, vW, 'V', 'rgba(124,58,237,0.7)');
  }

  return c.toDataURL('image/jpeg', 0.8);
}

async function saveLayout(slot = 'both') {
  const name = document.getElementById('layout-name').value.trim();
  if (!name) { setStatus('Enter a layout name first.', false); return; }
  const entry = layouts[name] || {};
  if (slot === 'h' || slot === 'both') entry.h = activeH ? { ...activeH } : null;
  if (slot === 'v' || slot === 'both') entry.v = activeV ? { ...activeV } : null;
  entry.thumb = await captureLayoutThumb(slot);
  try {
    await fetch(`${WORKER}/layouts/${encodeURIComponent(name)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },
      body: JSON.stringify(entry)
    });
    layouts[name] = entry;
    if (!layoutOrder.includes(name)) { layoutOrder.push(name); saveLayoutOrder(); }
    renderGrid();
    const label = slot === 'both' ? 'H+V' : slot.toUpperCase();
    setStatus(`Layout "${name}" saved (${label}).`, true);
  } catch(e) { setStatus('Error saving layout: ' + e.message, false); }
}

async function recallLayoutToSlot(name, slot) {
  const layout = layouts[name];
  if (!layout) return;
  const slots = slot === 'both' ? ['h', 'v'] : [slot];
  for (const s of slots) {
    if (!(s in layout)) continue;
    const state = layout[s];
    if (state) {
      await fetch(`${WORKER}/select`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },
        body: JSON.stringify({ slot: s, key: state.key, name: state.name || state.key, scale: state.scale, fit: state.fit, x: state.x, y: state.y })
      });
    }
  }
  const label = slot === 'both' ? 'H+V' : slot.toUpperCase();
  setStatus(`Layout "${name}" recalled (${label}).`, true);
  await pollActive();
}

async function deleteLayoutCard(name) {
  if (!confirm(`Delete layout "${name}"?`)) return;
  try {
    await fetch(`${WORKER}/layouts/${encodeURIComponent(name)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
    delete layouts[name];
    layoutOrder = layoutOrder.filter(n => n !== name);
    saveLayoutOrder();
    renderGrid();
    setStatus(`Layout "${name}" deleted.`, true);
  } catch(e) { setStatus('Error deleting layout: ' + e.message, false); }
}


// ── Modal helpers ─────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'edit-modal' && cropper) { cropper.destroy(); cropper = null; }
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => closeModal(el.id)); });
</script>
