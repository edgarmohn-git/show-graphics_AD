<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery — Show Graphics</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; background: #111; color: #eee; }
  h1 { font-size: 1.4rem; color: #fff; margin-bottom: 16px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  input[type=text], input[type=password] {
    padding: 8px 12px; background: #222; border: 1px solid #444;
    color: #fff; border-radius: 6px; font-size: 0.9rem;
  }
  input[type=text] { flex: 1; min-width: 200px; }
  button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover { background: #991b1b; }
  .btn-slot { background: #064e3b; color: #6ee7b7; }
  .btn-slot.active-h { background: #1e40af; color: #93c5fd; }
  .btn-slot.active-v { background: #5b21b6; color: #c4b5fd; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .card {
    background: #1a1a1a; border-radius: 8px; overflow: hidden;
    border: 2px solid transparent; transition: border-color 0.2s;
  }
  .card.selected-h { border-color: #2563eb; }
  .card.selected-v { border-color: #7c3aed; }
  .card img { width: 100%; height: 160px; object-fit: cover; display: block; background: #222; }
  .card-body { padding: 10px; }
  .card-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
  .card-tags { font-size: 0.75rem; color: #888; margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-actions button { font-size: 0.75rem; padding: 5px 10px; }

  .active-bar {
    display: flex; gap: 20px; margin-bottom: 20px; padding: 14px;
    background: #1a1a1a; border-radius: 8px; flex-wrap: wrap;
  }
  .active-slot { flex: 1; min-width: 200px; }
  .active-slot h3 { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
  .active-slot .name { font-weight: 600; font-size: 1rem; }
  .slot-controls { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .slot-controls label { font-size: 0.8rem; color: #888; }
  input[type=range] { width: 100px; }
  select { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; }

  #status { padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; display: none; margin-bottom: 12px; }
  #status.ok { background: #14532d; color: #86efac; display: block; }
  #status.err { background: #450a0a; color: #fca5a5; display: block; }
</style>
</head>
<body>
<h1>🖼 Show Graphics Gallery</h1>

<div class="toolbar">
  <input type="password" id="api-key" placeholder="API Key" style="width:160px;flex:none;">
  <button class="btn-primary" onclick="saveKey()">Set Key</button>
  <input type="text" id="search" placeholder="Search by name or tag…" oninput="renderGrid()">
  <button class="btn-primary" onclick="loadGallery()">↺ Refresh</button>
</div>

<div id="status"></div>

<div class="active-bar">
  <div class="active-slot">
    <h3>🔵 SLOT H (Horizontal)</h3>
    <div class="name" id="active-h-name">— empty —</div>
    <div class="slot-controls">
      <label>Scale</label>
      <input type="range" id="scale-h" min="10" max="200" value="100" oninput="updateSlot('h')">
      <span id="scale-h-val">100%</span>
      <label>Fit</label>
      <select id="fit-h" onchange="updateSlot('h')"><option value="contain">Contain</option><option value="cover">Cover</option></select>
      <button class="btn-danger" onclick="clearSlot('h')">Clear</button>
    </div>
  </div>
  <div class="active-slot">
    <h3>🟣 SLOT V (Vertical)</h3>
    <div class="name" id="active-v-name">— empty —</div>
    <div class="slot-controls">
      <label>Scale</label>
      <input type="range" id="scale-v" min="10" max="200" value="100" oninput="updateSlot('v')">
      <span id="scale-v-val">100%</span>
      <label>Fit</label>
      <select id="fit-v" onchange="updateSlot('v')"><option value="contain">Contain</option><option value="cover">Cover</option></select>
      <button class="btn-danger" onclick="clearSlot('v')">Clear</button>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
  const WORKER = 'https://show-graphics-ad.mohn-edgar.workers.dev';
  let images = [];
  let activeH = null, activeV = null;

  window.onload = () => {
    const saved = sessionStorage.getItem('sg_api_key');
    if (saved) document.getElementById('api-key').value = saved;
    loadGallery();
    pollActive();
    setInterval(pollActive, 3000);
  };

  function saveKey() {
    const k = document.getElementById('api-key').value.trim();
    if (k) { sessionStorage.setItem('sg_api_key', k); setStatus('Key saved.', true); }
  }

  function apiKey() { return sessionStorage.getItem('sg_api_key') || ''; }

  function setStatus(msg, ok) {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = ok ? 'ok' : 'err';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  async function loadGallery() {
    try {
      const r = await fetch(`${WORKER}/list`, { headers: { 'X-API-Key': apiKey() } });
      images = await r.json();
      renderGrid();
    } catch(e) { setStatus('Failed to load: ' + e.message, false); }
  }

  async function pollActive() {
    try {
      const [rh, rv] = await Promise.all([
        fetch(`${WORKER}/active?slot=h`).then(r => r.json()),
        fetch(`${WORKER}/active?slot=v`).then(r => r.json()),
      ]);
      activeH = rh; activeV = rv;
      document.getElementById('active-h-name').textContent = rh ? (rh.name || rh.key) : '— empty —';
      document.getElementById('active-v-name').textContent = rv ? (rv.name || rv.key) : '— empty —';
      if (rh) { document.getElementById('scale-h').value = rh.scale; document.getElementById('scale-h-val').textContent = rh.scale + '%'; document.getElementById('fit-h').value = rh.fit; }
      if (rv) { document.getElementById('scale-v').value = rv.scale; document.getElementById('scale-v-val').textContent = rv.scale + '%'; document.getElementById('fit-v').value = rv.fit; }
      renderGrid();
    } catch(e) {}
  }

  function renderGrid() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = images.filter(img =>
      !q || img.name.toLowerCase().includes(q) || (img.tags || []).some(t => t.toLowerCase().includes(q))
    );
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    filtered.forEach(img => {
      const isH = activeH?.key === img.key;
      const isV = activeV?.key === img.key;
      const card = document.createElement('div');
      card.className = `card${isH ? ' selected-h' : ''}${isV ? ' selected-v' : ''}`;
      card.innerHTML = `
        <img src="${WORKER}/img/${encodeURIComponent(img.key)}" loading="lazy">
        <div class="card-body">
          <div class="card-name">${img.name}</div>
          <div class="card-tags">${(img.tags || []).join(', ') || '&nbsp;'}</div>
          <div class="card-actions">
            <button class="btn-slot${isH ? ' active-h' : ''}" onclick="selectSlot('h','${img.key}','${img.name}')">
              ${isH ? '✓ H active' : 'Set H'}
            </button>
            <button class="btn-slot${isV ? ' active-v' : ''}" onclick="selectSlot('v','${img.key}','${img.name}')">
              ${isV ? '✓ V active' : 'Set V'}
            </button>
            <button class="btn-danger" onclick="deleteImage('${img.key}')">🗑</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    if (!filtered.length) grid.innerHTML = '<p style="color:#666;padding:20px">No images found.</p>';
  }

  async function selectSlot(slot, key, name) {
    const scale = parseInt(document.getElementById(`scale-${slot}`).value);
    const fit = document.getElementById(`fit-${slot}`).value;
    try {
      await fetch(`${WORKER}/select`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey() },
        body: JSON.stringify({ slot, key, name, scale, fit, x: 50, y: 50 })
      });
      setStatus(`Set ${slot.toUpperCase()}: ${name}`, true);
      await pollActive();
    } catch(e) { setStatus('Error: ' + e.message, false); }
  }

  async function updateSlot(slot) {
    const active = slot === 'h' ? activeH : activeV;
    if (!active) return;
    document.getElementById(`scale-${slot}-val`).textContent = document.getElementById(`scale-${slot}`).value + '%';
    await selectSlot(slot, active.key, active.name || active.key);
  }

  async function clearSlot(slot) {
    try {
      await fetch(`${WORKER}/select?slot=${slot}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
      setStatus(`Slot ${slot.toUpperCase()} cleared`, true);
      await pollActive();
    } catch(e) { setStatus('Error: ' + e.message, false); }
  }

  async function deleteImage(key) {
    if (!confirm('Delete this image?')) return;
    try {
      await fetch(`${WORKER}/img/${encodeURIComponent(key)}`, { method: 'DELETE', headers: { 'X-API-Key': apiKey() } });
      setStatus('Deleted', true);
      await loadGallery();
    } catch(e) { setStatus('Error: ' + e.message, false); }
  }
</script>
</body>
</html>
